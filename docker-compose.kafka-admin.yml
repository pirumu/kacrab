name: kacrab-kafka-admin

# Single-broker KRaft tuned for exercising the full admin surface:
#   - StandardAuthorizer with ANONYMOUS as a super user (ACL ops over PLAINTEXT)
#   - share/streams group features (KIP-932 / KIP-1071) — formatted on by default
#     in 4.3.0 (share.version=1, streams.version=1)
services:
  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:4.3.0}
    container_name: kacrab-kafka-admin
    ports:
      - "${KAFKA_HOST_PORT:-9092}:9092"
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:${KAFKA_HOST_PORT:-9092},INTERNAL://kafka:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      # ACLs
      KAFKA_AUTHORIZER_CLASS_NAME: org.apache.kafka.metadata.authorizer.StandardAuthorizer
      KAFKA_SUPER_USERS: User:ANONYMOUS
      KAFKA_ALLOW_EVERYONE_IF_NO_ACL_FOUND: "true"
      # Share + streams groups (early access): features are formatted on by
      # default in 4.3.0; just size their state topics for a single broker.
      KAFKA_UNSTABLE_API_VERSIONS_ENABLE: "true"
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
    volumes:
      - kafka-admin-data:/var/lib/kafka/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

volumes:
  kafka-admin-data:
