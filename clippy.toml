avoid-breaking-exported-api = false
msrv = "1.95"

# Complexity thresholds — tighter than default.
cognitive-complexity-threshold = 25
too-many-arguments-threshold = 5
too-many-lines-threshold = 100
type-complexity-threshold = 200
single-char-binding-names-threshold = 4
trivial-copy-size-limit = 16
literal-representation-threshold = 16384

# Naming.
disallowed-names = ["foo", "bar", "baz", "qux", "tmp", "temp", "data", "val"]
upper-case-acronyms-aggressive = true

# Test ergonomics — relax restriction lints inside tests/benches.
allow-expect-in-tests = true
allow-unwrap-in-tests = true
allow-panic-in-tests = true
allow-print-in-tests = true
allow-dbg-in-tests = true
allow-indexing-slicing-in-tests = true

# Doc requirements.
doc-valid-idents = ["..", "MSRV", "CLI", "API", "GPU", "CPU", "JSON", "YAML", "TOML", "URL", "UUID", "HTTP", "HTTPS", "IPv4", "IPv6", "TCP", "UDP", "SHA1", "SHA256", "MD5", "Rust"]
