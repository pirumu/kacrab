name: ci

# Enforce the things the repo claims: formatting, the strict clippy lint set,
# the full test suite (incl. the Java oracle matrix's non-ignored tests), code
# coverage, and dependency/license/advisory policy. Runs on every push to master
# and every PR.

on:
  push:
    branches: [master]
    # Docs-only changes don't affect the build/tests — skip the heavy
    # fmt/clippy/test/coverage run (the design book has its own deploy in
    # docs.yml). A mixed code+docs change still runs, since paths-ignore only
    # skips when *every* changed file matches.
    paths-ignore:
      - "docs-book/**"
      - "**/*.md"
      - "LICENSE-*"
      - ".github/workflows/docs.yml"
  pull_request:
    paths-ignore:
      - "docs-book/**"
      - "**/*.md"
      - "LICENSE-*"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gssapi (libgssapi) needs libkrb5; zstd / lz4-hc need a C compiler (gcc
      # is preinstalled). --all-features pulls all of these.
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      # Installs the toolchain pinned by rust-toolchain.toml (1.95 + clippy).
      - name: Pinned Rust toolchain
        run: rustup show

      # `make fmt-check` runs `cargo +nightly fmt` (uses unstable rustfmt opts).
      - name: Nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: make fmt-check

      - name: Clippy (pedantic + nursery + cargo, -D warnings)
        run: make clippy

      - name: Test (workspace, all features)
        run: make test

  coverage:
    name: coverage (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      - name: Pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      # Coverage is INFORMATIONAL, not a CI gate. This crate is heavily async and
      # its tests lean on real timeouts and blocking semantics (max.block.ms,
      # delivery.timeout.ms, leadership-retry windows). Coverage instrumentation
      # slows execution enough to violate those timing windows, so a large and
      # *shifting* set of tests flakes under tarpaulin from one run to the next —
      # which makes it an unreliable gate (no fixed set to pin or ignore).
      # Correctness is enforced by the `fmt · clippy · test` job, which runs the
      # full suite uninstrumented. We still publish the report for visibility.
      # `continue-on-error` keeps a flaky instrumented run from blocking CI;
      # `--no-fail-fast` measures across the whole suite. Honors tarpaulin.toml.
      - name: Coverage (informational; non-blocking)
        continue-on-error: true
        run: cargo tarpaulin --workspace --all-features --engine llvm --timeout 360 --out Xml --no-fail-fast

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: cobertura.xml

  deny:
    name: cargo-deny (licenses · advisories · bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check
