name: ci

# Enforce the things the repo claims: formatting, the strict clippy lint set,
# the full test suite (incl. the Java oracle matrix's non-ignored tests), code
# coverage, and dependency/license/advisory policy. Runs on every push to master
# and every PR.

on:
  push:
    branches: [master]
    # Docs-only changes don't affect the build/tests — skip the heavy
    # fmt/clippy/test/coverage run (the design book has its own deploy in
    # docs.yml). A mixed code+docs change still runs, since paths-ignore only
    # skips when *every* changed file matches.
    paths-ignore:
      - "docs-book/**"
      - "**/*.md"
      - "LICENSE-*"
      - ".github/workflows/docs.yml"
  pull_request:
    paths-ignore:
      - "docs-book/**"
      - "**/*.md"
      - "LICENSE-*"
      - ".github/workflows/docs.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint-test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # gssapi (libgssapi) needs libkrb5; zstd / lz4-hc need a C compiler (gcc
      # is preinstalled). --all-features pulls all of these.
      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      # Installs the toolchain pinned by rust-toolchain.toml (1.95 + clippy).
      - name: Pinned Rust toolchain
        run: rustup show

      # `make fmt-check` runs `cargo +nightly fmt` (uses unstable rustfmt opts).
      - name: Nightly rustfmt
        run: rustup toolchain install nightly --profile minimal --component rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: make fmt-check

      - name: Clippy (pedantic + nursery + cargo, -D warnings)
        run: make clippy

      # Guards the docs.rs build: rustdoc deny-lints (broken intra-doc links)
      # only fire when docs are actually built, which test/clippy never do.
      - name: Rustdoc (workspace, all features, -D warnings)
        run: make doc-check

      - name: Test (workspace, all features)
        run: make test

  coverage:
    name: coverage (llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: System dependencies
        run: sudo apt-get update && sudo apt-get install -y libkrb5-dev

      - name: Pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # Real gate. cargo-llvm-cov uses LLVM source-based coverage and runs the
      # tests at near-native speed, so the suite's many timeout/blocking-based
      # async tests (max.block.ms, delivery.timeout.ms, leadership-retry windows)
      # keep passing under instrumentation — unlike tarpaulin, whose slowdown
      # tripped those timing windows and flaked a shifting set of tests run to
      # run. --ignore-filename-regex drops generated Kafka protocol/config
      # artifacts (validated by generator + Java oracle tests instead) and the
      # consumer's broker-I/O orchestration modules (client/coordinator/next_gen):
      # those are pure send-to-broker request/response flows exercised by the
      # ignored real-broker suite (tests/real_kafka_consumer.rs), which CI cannot
      # run since it needs a live Kafka container. Measured ~87% lines; the floor
      # sits below that for headroom — raise as it grows.
      - name: Coverage
        run: cargo llvm-cov --workspace --all-features --ignore-filename-regex '(benches/|kacrab-codegen/src/main\.rs|kacrab-macros/src/lib\.rs|kacrab/src/config/catalog\.rs|kacrab/src/consumer/client\.rs|kacrab/src/consumer/coordinator\.rs|kacrab/src/consumer/next_gen\.rs|kacrab-protocol/src/generated|kacrab-protocol/tests/support/generated_test_utils/)' --fail-under-lines 80 --cobertura --output-path cobertura.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: cobertura.xml

  deny:
    name: cargo-deny (licenses · advisories · bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check
        run: cargo deny check
