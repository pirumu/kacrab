name: docs

# Build the mdBook design book and deploy it to GitHub Pages.
# One-time setup: repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [master]
    paths:
      - "docs-book/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-progress deploy at a time; let it finish rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo-installed tools
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin
          key: mdbook-tools-v1

      - name: Install mdBook and the mermaid plugin
        run: |
          for tool in mdbook mdbook-mermaid; do
            command -v "$tool" >/dev/null 2>&1 || cargo install "$tool" --locked
          done

      - name: Install mermaid assets into the book
        run: mdbook-mermaid install docs-book

      - name: Build the book
        run: mdbook build docs-book

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-book/book

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
