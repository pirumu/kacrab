name: kacrab-kafka-gssapi

# Kerberos KDC + a SASL/GSSAPI Kafka broker, used to verify kacrab's GSSAPI
# client against a real broker. There is no static-token shortcut for GSSAPI
# (unlike OAUTHBEARER), so a live KDC is required.
#
#   realm           KACRAB.LOCAL
#   broker SPN      kafka/localhost@KACRAB.LOCAL  (keytab on the shared volume)
#   client princ    kacrab@KACRAB.LOCAL / kacrab-secret
#
# The broker SASL listener advertises localhost:19095, so a host client forms
# the SPN kafka/localhost and the broker keytab matches. Inter-broker traffic
# uses a separate PLAINTEXT INTERNAL listener (so the broker need not initiate
# Kerberos to itself). The KDC is reachable from the host at localhost:1088
# (TCP+UDP); use docs/host krb5.conf written by the verification step.
#
# Host steps after `docker compose -f docker-compose.gssapi.yml up -d`:
#
#   1) Write a host krb5.conf pointing at the published KDC (TCP forced, since
#      Docker Desktop's UDP loopback mapping is unreliable for Kerberos):
#        cat > /tmp/kacrab_krb5.conf <<'EOF'
#        [libdefaults]
#          default_realm = KACRAB.LOCAL
#          dns_lookup_realm = false
#          dns_lookup_kdc = false
#          rdns = false
#          dns_canonicalize_hostname = false
#        [realms]
#          KACRAB.LOCAL = { kdc = tcp/localhost:1088  admin_server = tcp/localhost:1088 }
#        [domain_realm]
#          localhost = KACRAB.LOCAL
#        EOF
#   2) Get a TGT into a throwaway cache (does not touch the system ccache):
#        export KRB5_CONFIG=/tmp/kacrab_krb5.conf KRB5CCNAME=FILE:/tmp/kacrab_krb5cc
#        printf 'kacrab-secret' | kinit --password-file=STDIN kacrab@KACRAB.LOCAL
#   3) Run the GSSAPI smoke test (it prefers the IPv4 broker address):
#        KACRAB_GSSAPI_BOOTSTRAP=localhost:19095 cargo test -p kacrab --features gssapi \
#          --test real_kafka_gssapi -- --ignored --nocapture

services:
  kdc:
    image: ubuntu:22.04
    container_name: kacrab-kdc
    ports:
      - "1088:88/tcp"
      - "1088:88/udp"
    volumes:
      - krb5share:/krb5share
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        export DEBIAN_FRONTEND=noninteractive
        apt-get update -qq >/dev/null
        apt-get install -y -qq krb5-kdc krb5-admin-server krb5-user >/dev/null

        cat > /etc/krb5.conf <<EOF
        [libdefaults]
          default_realm = KACRAB.LOCAL
          dns_lookup_realm = false
          dns_lookup_kdc = false
          rdns = false
          dns_canonicalize_hostname = false
          udp_preference_limit = 1
        [realms]
          KACRAB.LOCAL = {
            kdc = kdc:88
            admin_server = kdc:749
          }
        [domain_realm]
          localhost = KACRAB.LOCAL
        EOF

        mkdir -p /etc/krb5kdc
        cat > /etc/krb5kdc/kdc.conf <<EOF
        [kdcdefaults]
          kdc_ports = 88
          kdc_tcp_ports = 88
        [realms]
          KACRAB.LOCAL = {
            database_name = /var/lib/krb5kdc/principal
            admin_keytab = /etc/krb5kdc/kadm5.keytab
            acl_file = /etc/krb5kdc/kadm5.acl
            key_stash_file = /var/lib/krb5kdc/.k5.KACRAB.LOCAL
            max_life = 24h 0m 0s
            max_renewable_life = 7d 0h 0m 0s
            supported_enctypes = aes256-cts-hmac-sha1-96:normal aes128-cts-hmac-sha1-96:normal
          }
        EOF
        echo '*/admin@KACRAB.LOCAL *' > /etc/krb5kdc/kadm5.acl

        kdb5_util create -s -r KACRAB.LOCAL -P masterpassword
        kadmin.local -q "addprinc -randkey kafka/localhost@KACRAB.LOCAL"
        kadmin.local -q "addprinc -pw kacrab-secret kacrab@KACRAB.LOCAL"
        rm -f /krb5share/kafka.keytab
        kadmin.local -q "ktadd -k /krb5share/kafka.keytab kafka/localhost@KACRAB.LOCAL"
        chmod 644 /krb5share/kafka.keytab
        cp /etc/krb5.conf /krb5share/krb5-internal.conf
        echo "KDC ready: principals + keytab created"
        exec krb5kdc -n
    healthcheck:
      test: ["CMD-SHELL", "test -f /krb5share/kafka.keytab && pgrep krb5kdc >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 15s

  kafka-gssapi:
    image: ${KAFKA_IMAGE:-apache/kafka:4.3.0}
    container_name: kacrab-kafka-gssapi
    depends_on:
      kdc:
        condition: service_healthy
    ports:
      - "19095:9092"
    environment:
      KAFKA_OPTS: "-Djava.security.krb5.conf=/krb5share/krb5-internal.conf"
    volumes:
      - krb5share:/krb5share
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        until [ -f /krb5share/kafka.keytab ]; do echo "waiting for keytab..."; sleep 1; done

        cat > /tmp/server.properties <<EOF
        process.roles=broker,controller
        node.id=1
        controller.quorum.voters=1@localhost:9093
        listeners=SASL://:9092,INTERNAL://:29092,CONTROLLER://:9093
        advertised.listeners=SASL://localhost:19095,INTERNAL://kafka-gssapi:29092
        listener.security.protocol.map=SASL:SASL_PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
        controller.listener.names=CONTROLLER
        inter.broker.listener.name=INTERNAL
        sasl.enabled.mechanisms=GSSAPI
        sasl.kerberos.service.name=kafka
        listener.name.sasl.gssapi.sasl.jaas.config=com.sun.security.auth.module.Krb5LoginModule required useKeyTab=true storeKey=true keyTab="/krb5share/kafka.keytab" principal="kafka/localhost@KACRAB.LOCAL";
        log.dirs=/tmp/kraft-combined-logs
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        group.initial.rebalance.delay.ms=0
        auto.create.topics.enable=true
        num.partitions=3
        EOF

        /opt/kafka/bin/kafka-storage.sh format \
          -t "${KAFKA_CLUSTER_ID:-4L6g3nShT-eMCtK--X86sw}" \
          -c /tmp/server.properties \
          --ignore-formatted

        exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server kafka-gssapi:29092 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 10s
      retries: 40
      start_period: 30s

volumes:
  krb5share:
